<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rattle Empire | Uganda's #1 Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .glass { background: rgba(15, 15, 30, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="bg-[#0f0f1e] text-white min-h-screen">
    <header class="fixed top-0 w-full z-50 glass border-b border-white/10 p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-purple-500 animate-float">👑 Rattle Empire</h1>
        <nav class="space-x-4">
            <a href="#sellers" class="hover:text-purple-400">Top Sellers</a>
            <a href="#cart" class="text-purple-400 font-bold">Cart (0)</a>
        </nav>
    </header>

    <main class="pt-24 px-4 max-w-6xl mx-auto">
        <section id="deals" class="mb-12">
            <h2 class="text-3xl mb-6">Featured Deals</h2>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="sellers" class="mb-12 glass p-6 rounded-xl">
            <h2 class="text-3xl mb-6">Highest Ranked Sellers</h2>
            <div id="seller-list" class="space-y-4"></div>
        </section>

        <section class="glass p-6 rounded-xl">
            <h2 class="text-2xl mb-4">Support & Affiliation</h2>
            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <h3 class="text-purple-400 font-bold">Helplines</h3>
                    <p>Derrick: <a href="https://wa.me/256775374095" class="text-blue-400">0775 374 095</a></p>
                    <p>Shawn: <a href="https://wa.me/256744341738" class="text-blue-400">0744 341 738</a></p>
                </div>
                <div>
                    <h3 class="text-purple-400 font-bold">Direct Management</h3>
                    <p>Trevor (CEO): <a href="tel:0752937558" class="text-green-400">0752 937 558</a></p>
                    <p>Becca (Manager): <a href="tel:0703162884" class="text-green-400">0703 162 884</a></p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const products = [
            { id: 1, name: "iPhone X 256GB", price: 850000, seller: "Derrick", loc: "Kampala" },
            { id: 2, name: "HP EliteBook G3", price: 1200000, seller: "Shawn", loc: "Entebbe" }
        ];

        const render = () => {
            document.getElementById('product-grid').innerHTML = products.map(p => `
                <div class="glass p-4 rounded-lg">
                    <h3 class="font-bold">${p.name}</h3>
                    <p class="text-purple-400">UGX ${p.price.toLocaleString()}</p>
                    <button onclick="alert('Added to local cart!')" class="mt-2 w-full bg-purple-600 p-2 rounded">Add to Cart</button>
                    <a href="https://wa.me/256775374095?text=I'm interested in ${p.name}" class="block mt-2 text-center text-sm text-green-400">WhatsApp Inquiry</a>
                </div>
            `).join('');
        };
        render();
    </script>
</body>
</html>
